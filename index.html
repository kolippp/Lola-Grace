<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TO DO — Portfolio</title>
  <meta name="description" content="TO DO portfolio website" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#f7f3ee;
      --bg-soft:#efe8df;
      --panel:rgba(255,255,255,0.78);
      --line:rgba(75,57,40,0.14);
      --line-soft:rgba(75,57,40,0.08);
      --text:#2c241d;
      --muted:#7d6c5d;
      --accent:#b58b62;
      --accent-soft:#d8b89a;
      --white:#fffdfa;
      --shadow:0 18px 42px rgba(64,46,28,0.08);
      --radius:20px;
      --max:1160px;
      --transition:0.35s ease;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      font-family:"Inter", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(181,139,98,0.08), transparent 28%),
        radial-gradient(circle at bottom right, rgba(216,184,154,0.08), transparent 24%),
        var(--bg);
      color:var(--text);
      overflow-x:hidden;
    }

    body.loading{
      overflow:hidden;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    img, video{
      display:block;
      width:100%;
    }

    .container{
      width:min(var(--max), calc(100% - 24px));
      margin:0 auto;
    }

    /* loader */
    .loader{
      position:fixed;
      inset:0;
      z-index:300;
      background:linear-gradient(180deg, #f8f4ef, #efe7dd);
      display:flex;
      align-items:center;
      justify-content:center;
      transition:opacity .9s ease, visibility .9s ease;
    }

    .loader.hidden{
      opacity:0;
      visibility:hidden;
      pointer-events:none;
    }

    .loader-inner{
      text-align:center;
      display:grid;
      gap:14px;
    }

    .loader-mark{
      width:76px;
      height:76px;
      border-radius:50%;
      border:1px solid rgba(181,139,98,0.35);
      display:flex;
      align-items:center;
      justify-content:center;
      margin:0 auto;
      font-family:"Cormorant Garamond", serif;
      font-size:24px;
      color:var(--accent);
      position:relative;
      overflow:hidden;
      box-shadow:0 0 0 10px rgba(181,139,98,0.05);
    }

    .loader-mark::before{
      content:"";
      position:absolute;
      inset:-18%;
      border-radius:50%;
      border:2px solid transparent;
      border-top-color:var(--accent);
      border-right-color:rgba(181,139,98,0.35);
      animation:spin 1.4s linear infinite;
    }

    .loader-text{
      font-size:10px;
      letter-spacing:.24em;
      text-transform:uppercase;
      color:var(--muted);
      font-weight:600;
    }
